<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Space Cat — Prototype v0.1</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a18 100%);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    display:flex;justify-content:center;align-items:center;
    overflow:hidden;touch-action:none;min-height:100vh;
  }
  #wrap{position:relative;width:min(100vw, calc(100vh * 4 / 7));height:min(100vh, calc(100vw * 7 / 4));max-width:100vw;max-height:100vh;aspect-ratio:4/7}
  canvas{display:block;width:100%;height:100%;background:#87ceeb;box-shadow:none}
  #ui{position:absolute;top:env(safe-area-inset-top,0);left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;pointer-events:none;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.55);z-index:5}
  #score{font-size:26px;letter-spacing:.5px}
  #best{font-size:13px;opacity:.85;align-self:center;letter-spacing:.5px}
  #hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;opacity:.55;pointer-events:none;letter-spacing:.5px}
  .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(20,30,60,.78));display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;border-radius:14px;padding:24px;text-align:center;backdrop-filter:blur(2px)}
  .overlay h1{font-size:30px;margin-bottom:6px;letter-spacing:1px}
  .overlay h2{font-size:30px;margin-bottom:8px;letter-spacing:.5px}
  .overlay p{margin:4px 0;opacity:.92;font-size:13px;line-height:1.5}
  .overlay .keys{font-size:11px;opacity:.6;margin-top:8px;line-height:1.5}
  .overlay button{margin-top:24px;padding:14px 38px;font-size:17px;background:#ffb84a;color:#1a1a2e;border:none;border-radius:10px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #b8842a;transition:transform .08s, box-shadow .08s}
  .overlay button:active{transform:translateY(2px);box-shadow:0 2px 0 #b8842a}
  /* 묘종 선택기 */
  #breedPicker{display:flex;align-items:center;gap:10px;margin-top:14px;background:rgba(0,0,0,0.25);padding:14px 8px;border-radius:14px;width:100%;max-width:320px}
  #breedDisplay{flex:1;text-align:center}
  #breedPreview{image-rendering:pixelated;width:120px;height:111px;background:rgba(0,0,0,0.18);border-radius:8px;display:block;margin:0 auto 6px}
  #breedName{font-size:15px;font-weight:700;margin-bottom:3px;color:#fff}
  #breedDesc{font-size:11px;opacity:.7;line-height:1.4;min-height:30px;padding:0 4px}
  .breedNav{margin:0 !important;padding:8px 14px !important;font-size:18px !important;background:rgba(255,255,255,0.15) !important;color:#fff !important;box-shadow:none !important;border-radius:10px !important;font-weight:700;cursor:pointer;flex-shrink:0}
  .breedNav:active{transform:scale(0.92);background:rgba(255,255,255,0.25) !important}
  .hidden{display:none!important}
  .new-record{color:#ffd84a;font-weight:700;font-size:18px;margin-top:8px;display:block}
  #finalScore{font-size:34px;font-weight:800;margin:10px 0;color:#ffd84a;text-shadow:0 2px 12px rgba(255,200,80,.5)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="700"></canvas>
  <div id="ui">
    <div id="score">0 m</div>
    <div id="best">BEST 0 m</div>
  </div>
  <div id="hint">← → 이동 ・ 모바일: 자동 점프 / 화면 어디든 누른 채 좌우로 끌기 / 벽에 닿았을 때 탭=벽점프</div>

  <div id="menu" class="overlay">
    <h1>🐱 SPACE CAT</h1>
    <p>고양이를 우주까지 올려보세요</p>

    <div id="breedPicker">
      <button id="breedPrev" class="breedNav">◀</button>
      <div id="breedDisplay">
        <canvas id="breedPreview" width="80" height="74"></canvas>
        <div id="breedName">치즈 태비</div>
        <div id="breedDesc">오렌지 줄무늬. 명랑하고 활동적.</div>
      </div>
      <button id="breedNext" class="breedNav">▶</button>
    </div>

    <p style="opacity:.7; font-size:11px; margin-top:6px">벽 점프 · 새/구름 밟기로 더 높이!</p>
    <div class="keys" style="font-size:10px; opacity:.6">탭=점프 / 누른 채 좌우 끌기=이동 / 벽에서 탭=벽점프</div>
    <button id="startBtn">시작</button>
  </div>

  <div id="gameover" class="overlay hidden">
    <h2>💫 GAME OVER</h2>
    <p id="finalScore">0 m</p>
    <p id="bestNote" style="opacity:.85"></p>
    <button id="restartBtn">다시</button>
  </div>
</div>

<script>
'use strict';

// ============== 상수 ==============
const W = 400, H = 700;
const GRAVITY = 0.45;
const JUMP_VEL = -13.5;
const SUPER_JUMP_VEL = -17;
const WALL_JUMP_X = 8;
const WALL_JUMP_Y = -14;
const MOVE_ACCEL = 0.55;
const MAX_VX = 5;
const FRICTION = 0.85;
const WALL_SLIDE_VY = 2.2;

// ============== 묘종 정의 (v10f-2 추가) ==============
const breeds = [
  { id:'cheese', name:'치즈 태비', desc:'오렌지 줄무늬. 명랑하고 활동적.', coat:'short',
    body:'#f0a040', dark:'#c8782a', belly:'#fff8e8', earInner:'#ff90a0', nose:'#ff66aa', pattern:'tabby' },
  { id:'black', name:'검은 고양이', desc:'시크하고 신비로운 분위기.', coat:'short',
    body:'#2c2c34', dark:'#1a1a22', belly:'#4a4a55', earInner:'#704050', nose:'#a04060', pattern:'solid', eyeColor:'#ffd84a' },
  { id:'white', name:'흰 고양이', desc:'순수하고 우아. 별빛 같은 털.', coat:'short',
    body:'#f5f0e6', dark:'#d8d0bc', belly:'#ffffff', earInner:'#ffb0c0', nose:'#ff90b0', pattern:'solid', eyeColor:'#5da9e0' },
  { id:'calico', name:'삼색이', desc:'오렌지·검정·흰 삼색. 친근한 묘종.', coat:'short',
    body:'#f0a040', dark:'#c8782a', belly:'#fff8e8', earInner:'#ff90a0', nose:'#ff66aa', pattern:'calico' },
  { id:'tuxedo', name:'턱시도', desc:'검은 등 + 흰 배. 정장 입은 신사.', coat:'short',
    body:'#2c2c34', dark:'#1a1a22', belly:'#ffffff', earInner:'#704050', nose:'#ff66aa', pattern:'tuxedo', eyeColor:'#90c878' },
  { id:'russian-blue', name:'러시안 블루', desc:'회청색 단모. 우아한 귀족.', coat:'short',
    body:'#6b7a8a', dark:'#4a5566', belly:'#8a98a8', earInner:'#a89aa6', nose:'#d8a0b8', pattern:'solid', eyeColor:'#90c878' },
  { id:'siamese', name:'시암', desc:'얼굴·귀·꼬리 포인트 컬러. 동양적.', coat:'short',
    body:'#e8d8b8', dark:'#6b4a3a', belly:'#f0e4cc', earInner:'#a87060', nose:'#a86058', pattern:'siamese', eyeColor:'#5da9e0' },
  { id:'tabby-white', name:'토비 화이트', desc:'흰 바탕 + 오렌지 패치.', coat:'short',
    body:'#f5f0e6', dark:'#d8d0bc', belly:'#ffffff', earInner:'#ff90a0', nose:'#ff66aa', pattern:'tabby-white',
    accentBody:'#f0a040', accentDark:'#c8782a' },
  { id:'persian', name:'페르시안', desc:'풍성한 장모, 동글동글 얼굴.', coat:'long',
    body:'#f0e0c8', dark:'#c8a878', belly:'#fff8e8', earInner:'#ffb0c0', nose:'#ff90b0', pattern:'solid',
    eyeColor:'#ff8c5f', fluffColor:'#ffefd8' },
  { id:'maine-coon', name:'메인쿤', desc:'거대한 장모종. 술 달린 귀.', coat:'long',
    body:'#9a7050', dark:'#5a3820', belly:'#d8b890', earInner:'#a87060', nose:'#a86058', pattern:'tabby',
    eyeColor:'#90c878', fluffColor:'#b88a68', earTufts:true },
];
let selectedBreedIdx = 0;  // 시작 시 localStorage에서 복원

// ============== 캔버스 ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ============== 상태 ==============
let game, cat, platforms, particles;
let lastGenY;
let lastPlatformX = W * 0.5;  // 마지막 메인 발판 중심 X (지그재그 배치용)

// ============== 입력 ==============
const keys = { left:false, right:false };
let jumpRequested = false;

addEventListener('keydown', e=>{
  if(['ArrowLeft','KeyA'].includes(e.code)) keys.left=true;
  if(['ArrowRight','KeyD'].includes(e.code)) keys.right=true;
  if(['Space','ArrowUp','KeyW'].includes(e.code)){ e.preventDefault(); jumpRequested=true; }
});
addEventListener('keyup', e=>{
  if(['ArrowLeft','KeyA'].includes(e.code)) keys.left=false;
  if(['ArrowRight','KeyD'].includes(e.code)) keys.right=false;
});

// 모바일 v0.10e: 가상 조이스틱 + 자동 점프 + 벽점프
// - 발판 착지 → 자동 점프 (충돌 처리에서)
// - 터치 시작 위치 = 조이스틱 중심 (그립 위치 무관)
// - 시작 위치 기준 드래그 X 거리 → 캐릭터 X 속도 (가상 조이스틱)
// - 벽 슬라이드 중 새 터치 = 벽점프
const STICK_FULL_PX = 65;          // 시작 위치 기준 이 거리 끌면 풀 X 속도
const STICK_DEAD_PX = 5;           // 이 이내는 정지

let stickStartX = null;            // 터치 시작 시 X (조이스틱 중심)
let stickCurX = null;              // 현재 손가락 X
let activeTouchId = null;
let stickVx = 0;                   // 조이스틱이 결정한 X 속도

function getTouchX(t, rect){
  return (t.clientX - rect.left) * (W / rect.width);
}

function updateStickVx(){
  if(stickStartX === null || stickCurX === null){ stickVx = 0; return; }
  const dx = stickCurX - stickStartX;
  if(Math.abs(dx) < STICK_DEAD_PX){ stickVx = 0; return; }
  const dir = dx > 0 ? 1 : -1;
  // 선형에 가까운 곡선 (x^0.85) — 끌리는 만큼 비례하여 속도 증가, 정밀 컨트롤 가능
  // 0.2 끌기 → 0.26 파워, 0.5 → 0.56, 0.8 → 0.83, 1.0 → 1.0
  const linear = Math.min(1, (Math.abs(dx) - STICK_DEAD_PX) / (STICK_FULL_PX - STICK_DEAD_PX));
  const curve = Math.pow(linear, 0.85);
  stickVx = dir * MAX_VX * curve;
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for(const t of e.changedTouches){
    if(activeTouchId === null){
      activeTouchId = t.identifier;
      stickStartX = getTouchX(t, rect);
      stickCurX = stickStartX;
      // 벽 슬라이드 중이면 즉시 벽점프 발사
      if(cat && cat.onWall !== 0){
        jumpRequested = true;
      }
    }
  }
  updateStickVx();
}, {passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for(const t of e.changedTouches){
    if(t.identifier === activeTouchId){
      stickCurX = getTouchX(t, rect);
    }
  }
  updateStickVx();
}, {passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === activeTouchId){
      activeTouchId = null;
      stickStartX = null;
      stickCurX = null;
      stickVx = 0;
    }
  }
}, {passive:false});

canvas.addEventListener('touchcancel', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === activeTouchId){
      activeTouchId = null;
      stickStartX = null;
      stickCurX = null;
      stickVx = 0;
    }
  }
}, {passive:false});

// ============== 초기화 ==============
function initGame(){
  game = {
    state:'playing', score:0,
    best: parseInt(localStorage.getItem('catSpaceBest')||'0'),
    cameraY:0, highestY:0, frame:0,
  };
  cat = {
    x:W/2-14, y:H-80, vx:0, vy:0, w:28, h:32,
    onGround:false, onWall:0, facing:1,
    coyoteTimer:0, walljumpLock:0, squash:0,
  };
  platforms = [];
  particles = [];

  platforms.push({type:'ground', x:0, y:H-30, w:W, h:30});
  // 튜토리얼 발판
  platforms.push({type:'building', x:60,  y:H-140, w:80, h:16});
  platforms.push({type:'building', x:240, y:H-200, w:80, h:16});
  platforms.push({type:'building', x:100, y:H-280, w:70, h:16});
  platforms.push({type:'bird',     x:250, y:H-360, w:50, h:22, vx:1.2, origX:250, range:60, flap:0});

  lastGenY = H-380;
  lastPlatformX = W * 0.5;  // 지그재그 배치 추적용
  generateUpTo(-3000);
}

// ============== 절차적 생성 ==============
function generateUpTo(targetY){
  while(lastGenY > targetY){
    spawnAt(lastGenY);
    const height = (H-30) - lastGenY;
    const baseGap = 75;
    const variance = 35;
    const difficultyGap = Math.min(50, height/250);
    lastGenY -= baseGap + Math.random()*variance + difficultyGap;
  }
}

function spawnAt(y){
  const height = (H-30) - y;
  const r = Math.random();

  // 비행기 장애물 (높이 1500+)
  if(height > 1500 && Math.random() < 0.08){
    const dir = Math.random()<0.5 ? 1 : -1;
    platforms.push({
      type:'plane',
      x: dir>0 ? -60 : W+60,
      y: y - 20,
      w:64, h:22,
      vx: dir * (1.2 + Math.random()*1.2 + height/6000),
    });
  }

  // 메인 발판
  const w = 60 + Math.random()*40;

  // 지그재그 배치: 이전 발판 X 기준, 반대편에 우선 (점프 궤적과 머리 박힘 방지)
  // - 65% 확률로 반대편 (지그재그 메인)
  // - 35% 확률로 같은 쪽 (단조로움 방지, 자연스러운 변주)
  const MIN_X_DIST = 70;          // 이전 발판과의 최소 X 거리 (중심 기준)
  const lastCenterX = lastPlatformX;
  const isLeftSide = lastCenterX < W * 0.5;
  const goOpposite = Math.random() < 0.65;
  const targetSide = goOpposite ? !isLeftSide : isLeftSide;  // true=좌, false=우

  let x;
  let attempts = 0;
  do {
    if(targetSide){
      x = 8 + Math.random() * (W * 0.5 - 8 - w * 0.5);
    } else {
      x = W * 0.5 + Math.random() * (W * 0.5 - 8 - w * 0.5);
    }
    attempts++;
    if(attempts > 6) break;
  } while(Math.abs((x + w * 0.5) - lastCenterX) < MIN_X_DIST);

  x = Math.max(8, Math.min(W - 8 - w, x));
  lastPlatformX = x + w * 0.5;

  let type;
  if(height < 1500){
    type = r<0.85 ? 'building' : 'bird';
  } else if(height < 4000){
    type = r<0.5 ? 'cloud' : (r<0.85 ? 'building' : 'bird');
  } else if(height < 8000){
    type = r<0.65 ? 'cloud' : (r<0.9 ? 'building' : 'bird');
  } else {
    type = r<0.55 ? 'cloud' : (r<0.85 ? 'building' : 'bird');
  }

  if(type==='bird'){
    platforms.push({
      type:'bird', x, y, w:50, h:22,
      vx:(Math.random()<0.5?-1:1)*(1+Math.random()*1.2),
      origX:x, range:50+Math.random()*50, flap:0,
    });
  } else if(type==='cloud'){
    platforms.push({type:'cloud', x, y, w:80, h:20, used:false});
  } else {
    platforms.push({type:'building', x, y, w, h:16});
  }
}

// ============== 충돌 ==============
function handleCollision(p){
  const overlapX = cat.x+cat.w > p.x && cat.x < p.x+p.w;
  const overlapY = cat.y+cat.h > p.y && cat.y < p.y+p.h;

  if(p.type==='cloud'){
    if(p.used) return;
    if(cat.vy>1.5 && overlapX
       && cat.y+cat.h-cat.vy <= p.y+2
       && cat.y+cat.h >= p.y){
      cat.y = p.y - cat.h;
      cat.vy = JUMP_VEL*0.95;
      cat.onGround = true;
      cat.squash = 6;
      p.used = true;
      for(let i=0;i<8;i++){
        particles.push({
          x:p.x+p.w/2+(Math.random()-0.5)*p.w, y:p.y+4,
          vx:(Math.random()-0.5)*4, vy:-Math.random()*3,
          life:30, color:'rgba(255,255,255,0.85)', size:2+Math.random()*2
        });
      }
    }
    return;
  }

  if(p.type==='plane'){
    if(overlapX && overlapY){
      // 위에서 밟기 → 슈퍼 점프
      if(cat.vy>0 && cat.y+cat.h-cat.vy <= p.y+4){
        cat.y = p.y - cat.h;
        cat.vy = SUPER_JUMP_VEL;
        cat.onGround = true;
        cat.squash = 8;
        for(let i=0;i<10;i++){
          particles.push({
            x:p.x+p.w/2+(Math.random()-0.5)*p.w, y:p.y+p.h/2,
            vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*4,
            life:25, color:'#ffaaaa', size:2
          });
        }
      } else {
        // 측면/머리 충돌 → 추락
        cat.vy = Math.max(cat.vy, 4);
        cat.vx += (cat.x < p.x+p.w/2 ? -3 : 3);
        for(let i=0;i<6;i++){
          particles.push({
            x:cat.x+cat.w/2, y:cat.y+cat.h/2,
            vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*3,
            life:20, color:'#ff6655', size:2
          });
        }
      }
    }
    return;
  }

  // 일반 발판 (building, bird, ground)
  if(overlapX && overlapY){
    if(cat.vy>=0 && cat.y+cat.h-cat.vy <= p.y+2){
      cat.y = p.y - cat.h;
      cat.onGround = true;

      if(p.type==='bird'){
        cat.vy = SUPER_JUMP_VEL*0.85;
        cat.squash = 7;
        for(let i=0;i<6;i++){
          particles.push({
            x:p.x+p.w/2, y:p.y+8,
            vx:(Math.random()-0.5)*4, vy:-Math.random()*3,
            life:24, color:'#ffe066', size:2
          });
        }
      } else {
        // 옵션 X: 일반 발판 착지 → 즉시 자동 점프
        cat.vy = JUMP_VEL;
        cat.squash = 4;
        vibe(6);
      }
    } else if(cat.vy<0 && cat.y-cat.vy >= p.y+p.h-2){
      // 머리 부딪힘 → 점프 끊고 추락
      cat.y = p.y + p.h;
      cat.vy = Math.abs(cat.vy)*0.3 + 1;
    }
  }
}

// ============== 업데이트 ==============
function update(){
  if(game.state!=='playing') return;
  game.frame++;

  // 좌우 이동
  // - 모바일: stickVx (가상 조이스틱 출력) 직접 적용
  // - PC: keys.left/right 로 가속
  if(cat.walljumpLock<=0){
    if(activeTouchId !== null){
      // 가상 조이스틱 — stickVx를 목표로 부드럽게 보간 (즉시 세팅보다 자연스러움)
      cat.vx += (stickVx - cat.vx) * 0.30;
    } else {
      // 입력 없음 — PC 키보드 또는 관성
      if(keys.left)  cat.vx -= MOVE_ACCEL;
      if(keys.right) cat.vx += MOVE_ACCEL;
      if(!keys.left && !keys.right) cat.vx *= FRICTION;
    }
  } else {
    cat.walljumpLock--;
    cat.vx *= 0.98;
  }
  cat.vx = Math.max(-MAX_VX, Math.min(MAX_VX, cat.vx));
  if(Math.abs(cat.vx)>0.2) cat.facing = cat.vx>0 ? 1 : -1;

  // 점프 (PC 디버그용 Space만 유지 — 발판 자동 점프는 충돌 처리에서)
  if(jumpRequested){
    if(cat.onWall!==0){
      cat.vy = WALL_JUMP_Y;
      cat.vx = -cat.onWall * WALL_JUMP_X;
      cat.onWall = 0;
      cat.walljumpLock = 18;  // 벽점프 후 입력 잠금 (약 0.3초) — 손가락 추적이 즉시 벽으로 다시 끌고 가는 것 방지
      cat.squash = 5;
      vibe(12);
    } else if(cat.onGround || cat.coyoteTimer>0){
      cat.vy = JUMP_VEL;
      cat.onGround = false;
      cat.coyoteTimer = 0;
      cat.squash = 4;
      vibe(8);
    }
  }
  jumpRequested = false;

  // 중력 (정상)
  cat.vy += GRAVITY;
  if(cat.onWall!==0 && cat.vy>WALL_SLIDE_VY) cat.vy = WALL_SLIDE_VY;
  cat.vy = Math.min(cat.vy, 18);

  // 위치 업데이트
  cat.x += cat.vx;
  cat.y += cat.vy;

  // 화면 좌우 끝 = 벽
  if(cat.x <= 0){
    cat.x = 0;
    if(cat.vx<0) cat.vx = 0;
    if(cat.vy>-3 && !cat.onGround) cat.onWall = -1;
  } else if(cat.x+cat.w >= W){
    cat.x = W - cat.w;
    if(cat.vx>0) cat.vx = 0;
    if(cat.vy>-3 && !cat.onGround) cat.onWall = 1;
  }

  // 충돌 직전에 onGround 리셋, 가운데 있으면 onWall도 리셋
  const wasOnGround = cat.onGround;
  cat.onGround = false;
  if(cat.x>0.5 && cat.x+cat.w<W-0.5) cat.onWall = 0;
  if(cat.coyoteTimer>0) cat.coyoteTimer--;

  for(const p of platforms) handleCollision(p);

  if(wasOnGround && !cat.onGround) cat.coyoteTimer = 5;

  // 카메라 (위로만)
  const targetCamY = cat.y - H*0.45;
  if(targetCamY < game.cameraY) game.cameraY = targetCamY;

  // 점수
  const reachedHeight = (H-30) - cat.y;
  if(reachedHeight > game.highestY){
    game.highestY = reachedHeight;
    game.score = Math.floor(reachedHeight/8); // 8px = 1m
  }

  // 청크 생성/제거
  if(lastGenY > game.cameraY - 500) generateUpTo(game.cameraY - 1500);
  const cull = game.cameraY + H + 200;
  platforms = platforms.filter(p => p.y < cull);

  // 동적 객체 이동
  for(const p of platforms){
    if(p.type==='bird'){
      p.x += p.vx;
      if(p.x < p.origX-p.range) p.vx = Math.abs(p.vx);
      if(p.x > p.origX+p.range) p.vx = -Math.abs(p.vx);
      p.flap = (p.flap + 0.2) % (Math.PI*2);
    } else if(p.type==='plane'){
      p.x += p.vx;
      if(p.vx>0 && p.x > W+80) p.x = -p.w-20;
      if(p.vx<0 && p.x+p.w < -80) p.x = W+20;
    }
  }

  // 파티클
  for(const pt of particles){
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.18; pt.life--;
  }
  particles = particles.filter(pt => pt.life>0);

  // 추락 → 게임오버
  if(cat.y - game.cameraY > H+60) gameOver();

  if(cat.squash>0) cat.squash--;

  // UI
  document.getElementById('score').textContent = game.score + ' m';
  document.getElementById('best').textContent  = 'BEST ' + Math.max(game.score, game.best) + ' m';
}

function gameOver(){
  game.state = 'gameover';
  let isNew = false;
  if(game.score > game.best){
    game.best = game.score;
    localStorage.setItem('catSpaceBest', game.best);
    isNew = true;
    vibe([20, 60, 20, 60, 100]);
  } else {
    vibe([30, 30, 60]);
  }
  document.getElementById('finalScore').textContent = game.score + ' m';
  document.getElementById('bestNote').innerHTML = isNew
    ? '<span class="new-record">🌟 새 기록!</span>'
    : 'BEST: ' + game.best + ' m';
  document.getElementById('gameover').classList.remove('hidden');
}

// ============== 렌더링 ==============
function lerp(a,b,t){ return a+(b-a)*t; }

function render(){
  const height = game.highestY || 0;
  const t = Math.min(1, height/12000);

  // 배경 그라데이션 (도시 → 우주)
  const r1=lerp(135,8,t),  g1=lerp(206,8,t),  b1=lerp(235,30,t);
  const r2=lerp(176,28,t), g2=lerp(224,18,t), b2=lerp(230,75,t);
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,`rgb(${r1|0},${g1|0},${b1|0})`);
  grd.addColorStop(1,`rgb(${r2|0},${g2|0},${b2|0})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // 별 (3000m+)
  if(height>3000){
    const op = Math.min(0.95, (height-3000)/5000);
    const camOff = game.cameraY * 0.2;
    for(let i=0;i<60;i++){
      const sx = (i*137) % W;
      const baseY = (i*89) % (H*2);
      const sy = ((baseY - camOff) % (H*1.4) + H*1.4) % (H*1.4);
      if(sy<H && sy>-2){
        const sz = (i%3)+1;
        const tw = Math.sin(game.frame*0.05+i)*0.3+0.7;
        ctx.fillStyle = `rgba(255,255,255,${op*tw})`;
        ctx.fillRect(sx, sy, sz, sz);
      }
    }
  }

  // 카메라 변환
  ctx.save();
  ctx.translate(0, -game.cameraY);

  for(const p of platforms) drawPlatform(p);

  for(const pt of particles){
    ctx.fillStyle = pt.color;
    const sz = pt.size||2;
    ctx.fillRect(pt.x|0, pt.y|0, sz, sz);
  }

  drawCat();

  ctx.restore();

  // 화면 좌우 벽 살짝 표시
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0,0,3,H);
  ctx.fillRect(W-3,0,3,H);
}

function drawPlatform(p){
  if(p.type==='ground'){
    ctx.fillStyle='#3a2818'; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle='#5a4030'; ctx.fillRect(p.x,p.y,p.w,4);
    ctx.fillStyle='#4a8030';
    for(let i=0;i<p.w;i+=8) ctx.fillRect(p.x+i, p.y-2, 4, 2);
  } else if(p.type==='building'){
    ctx.fillStyle='#5a3826'; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle='#7a5536'; ctx.fillRect(p.x,p.y,p.w,3);
    ctx.fillStyle='#ffd66e';
    for(let i=6;i<p.w-4;i+=12) ctx.fillRect(p.x+i, p.y+6, 5, 5);
  } else if(p.type==='cloud'){
    ctx.globalAlpha = p.used ? 0.25 : 0.95;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.ellipse(p.x+p.w*0.22, p.y+p.h*0.55, 16, 12, 0, 0, Math.PI*2);
    ctx.ellipse(p.x+p.w*0.5,  p.y+p.h*0.45, 22, 14, 0, 0, Math.PI*2);
    ctx.ellipse(p.x+p.w*0.78, p.y+p.h*0.55, 16, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if(p.type==='bird'){
    const flap = Math.sin(p.flap||0)*4;
    ctx.fillStyle='#fff';
    ctx.fillRect(p.x+12, p.y+8, p.w-24, 8);
    const headX = p.vx>0 ? p.x+p.w-14 : p.x+4;
    ctx.fillRect(headX, p.y+6, 10, 8);
    ctx.fillStyle='#ffaa44';
    if(p.vx>0) ctx.fillRect(p.x+p.w-4, p.y+9, 5, 3);
    else        ctx.fillRect(p.x-1,    p.y+9, 5, 3);
    ctx.fillStyle='#000';
    ctx.fillRect(headX+(p.vx>0?6:2), p.y+8, 2, 2);
    ctx.strokeStyle='#bbb'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(p.x+12, p.y+10);
    ctx.lineTo(p.x+p.w/2-4, p.y-flap);
    ctx.lineTo(p.x+p.w/2,   p.y+10);
    ctx.moveTo(p.x+p.w-12, p.y+10);
    ctx.lineTo(p.x+p.w/2+4, p.y-flap);
    ctx.lineTo(p.x+p.w/2,   p.y+10);
    ctx.stroke();
  } else if(p.type==='plane'){
    const dir = p.vx>0 ? 1 : -1;
    ctx.fillStyle='#cc4444';
    ctx.fillRect(p.x+4, p.y+8, p.w-8, 8);
    ctx.fillStyle='#aa3333';
    ctx.fillRect(p.x+p.w*0.3, p.y+4, p.w*0.4, 16);
    ctx.fillStyle='#ddaa44';
    ctx.beginPath();
    if(dir>0){
      ctx.moveTo(p.x+p.w-4, p.y+8);
      ctx.lineTo(p.x+p.w+4, p.y+12);
      ctx.lineTo(p.x+p.w-4, p.y+16);
    } else {
      ctx.moveTo(p.x+4, p.y+8);
      ctx.lineTo(p.x-4, p.y+12);
      ctx.lineTo(p.x+4, p.y+16);
    }
    ctx.fill();
    ctx.fillStyle='#aa3333';
    if(dir>0) ctx.fillRect(p.x+2, p.y+2, 6, 8);
    else      ctx.fillRect(p.x+p.w-8, p.y+2, 6, 8);
    // 프로펠러 깜박임
    ctx.fillStyle = (game.frame % 4 < 2) ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
    if(dir>0) ctx.fillRect(p.x+p.w+2, p.y+6, 2, 12);
    else      ctx.fillRect(p.x-4,    p.y+6, 2, 12);
  }
}

function drawCat(){
  let { x,y,w,h, facing, squash, vy, onGround, vx } = cat;
  let sx=1, sy=1;
  if(squash>0){ sx = 1+squash*0.04; sy = 1-squash*0.05; }
  else if(vy<-3){ sx=0.92; sy=1.08; }
  else if(vy>6){ sx=0.95; sy=1.05; }

  ctx.save();
  ctx.translate(x+w/2, y+h);
  ctx.scale(facing*sx, sy);
  ctx.translate(-w/2, -h);

  // 선택된 묘종의 색·패턴 사용
  const breed = breeds[selectedBreedIdx];
  const baseColor = (breed.pattern === 'siamese') ? breed.dark : breed.body;
  const accentBody = breed.accentBody || breed.body;
  const accentDark = breed.accentDark || breed.dark;
  const eyeColor = breed.eyeColor || '#222';

  // 꼬리
  ctx.fillStyle = baseColor;
  ctx.fillRect(-3,14,6,4);
  ctx.fillRect(-6,10,4,5);
  // 몸통
  ctx.fillStyle = breed.body;
  ctx.fillRect(4,14,22,16);

  // 패턴별 몸통 추가
  if (breed.pattern === 'tuxedo') {
    ctx.fillStyle = breed.belly;
    ctx.fillRect(8,16,14,14);
  } else if (breed.pattern === 'calico') {
    ctx.fillStyle = '#2c2c34';
    ctx.fillRect(4,14,8,6);
    ctx.fillRect(18,18,8,5);
  } else if (breed.pattern === 'tabby-white') {
    ctx.fillStyle = accentBody;
    ctx.fillRect(8,14,14,6);
    ctx.fillRect(20,20,6,4);
  }

  // 배 (밝은 부분)
  if (breed.pattern !== 'tuxedo') {
    ctx.fillStyle = breed.belly;
    ctx.fillRect(8,22,14,7);
  }

  // 머리
  ctx.fillStyle = baseColor;
  ctx.fillRect(6,4,18,14);

  // 토비 화이트: 머리 패치
  if (breed.pattern === 'tabby-white') {
    ctx.fillStyle = accentBody;
    ctx.fillRect(6,4,8,8);
  }
  // 삼색이: 머리 검은 패치
  if (breed.pattern === 'calico') {
    ctx.fillStyle = '#2c2c34';
    ctx.fillRect(6,4,6,7);
  }

  // 귀
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.moveTo(6,6); ctx.lineTo(8,-1); ctx.lineTo(13,5); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(17,5); ctx.lineTo(22,-1); ctx.lineTo(24,6); ctx.fill();
  // 귀 안쪽
  ctx.fillStyle = breed.earInner;
  ctx.beginPath(); ctx.moveTo(8,4); ctx.lineTo(9,1); ctx.lineTo(11,4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,4); ctx.lineTo(20,1); ctx.lineTo(22,4); ctx.fill();

  // 메인쿤: 귀 끝 술
  if (breed.earTufts) {
    ctx.fillStyle = breed.fluffColor || breed.belly;
    ctx.fillRect(8,-2,1,2);
    ctx.fillRect(7,-3,2,1);
    ctx.fillRect(22,-2,1,2);
    ctx.fillRect(22,-3,2,1);
  }

  // 패턴별 줄무늬·음영
  if (breed.pattern === 'tabby') {
    ctx.fillStyle = breed.dark;
    ctx.fillRect(8,6,1,4); ctx.fillRect(13,5,1,5); ctx.fillRect(18,6,1,4);
    ctx.fillRect(8,17,14,1); ctx.fillRect(8,21,14,1);
  } else if (breed.pattern === 'tabby-white') {
    ctx.fillStyle = accentDark;
    ctx.fillRect(8,6,1,4); ctx.fillRect(20,16,1,4);
  } else if (breed.pattern === 'solid' || breed.pattern === 'siamese') {
    ctx.fillStyle = breed.dark;
    ctx.fillRect(8,17,14,1);
  }

  // 눈
  ctx.fillStyle = eyeColor;
  ctx.fillRect(11,9,2,3); ctx.fillRect(17,9,2,3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(11,9,1,1); ctx.fillRect(17,9,1,1);
  // 코·입
  ctx.fillStyle = breed.nose;
  ctx.fillRect(14,13,2,2);
  ctx.fillStyle = '#222';
  ctx.fillRect(13,15,1,1); ctx.fillRect(16,15,1,1);

  // 다리
  const showWhiteFeet = (breed.pattern === 'tuxedo' || breed.pattern === 'tabby-white');
  ctx.fillStyle = showWhiteFeet ? breed.belly : breed.body;
  if(onGround && Math.abs(vx)>0.5){
    const phase = Math.floor(performance.now()/100)%2;
    if(phase===0){ ctx.fillRect(5,28,5,4); ctx.fillRect(20,28,5,4); }
    else         { ctx.fillRect(7,28,5,4); ctx.fillRect(18,28,5,4); }
  } else if(onGround){
    ctx.fillRect(5,28,5,4); ctx.fillRect(20,28,5,4);
  } else {
    ctx.fillRect(7,28,5,4); ctx.fillRect(18,28,5,4);
  }

  ctx.restore();

  // 벽 슬라이드 시 먼지
  if(cat.onWall!==0 && cat.vy>0 && game.frame%4===0){
    particles.push({
      x: cat.onWall<0 ? cat.x : cat.x+cat.w,
      y: cat.y+cat.h-4,
      vx:(Math.random()-0.5)*1, vy:-Math.random()*1.2,
      life:18, color:'rgba(220,220,220,0.7)', size:2
    });
  }
}

// ============== 게임 루프 ==============
function loop(){
  update();
  render();
  drawDragIndicator();
  requestAnimationFrame(loop);
}

// 가상 조이스틱 시각화 — 시작점 외곽 원 + 현재 위치 점 + 연결선
function drawDragIndicator(){
  if(!cat || game.state !== 'playing') return;
  if(stickStartX === null || stickCurX === null) return;

  // 캔버스 좌표계 — UI 오버레이로 그리기 위해 카메라 변환 무시
  // (drawDragIndicator는 loop()에서 render() 다음 호출되며 카메라 변환 X)
  // 그런데 render() 끝나도 ctx 상태가 영향 있을 수 있어 명시적으로 reset

  // 화면 하단 적당한 Y에 시각화 (캐릭터 X와 무관, 손가락 위치 기준)
  // 손가락이 누른 화면 좌표를 그대로 사용해야 자연스러움
  // — 그런데 우리는 stickStartX/stickCurX가 게임 좌표(W=400 기준)이고,
  //   render() 에서 cameraY 변환 후 ctx.translate(0, -cameraY)이 적용된 상태일 수 있음
  // 안전하게 ctx.save() + setTransform으로 화면 좌표 직접 사용

  ctx.save();
  // 캔버스 리사이즈에서 적용된 DPR×SCALE 변환만 유지 (cameraY 제거)
  // 이 함수는 render() 외부에서 호출되므로 cameraY 변환 없음 — 그냥 그리면 됨

  const cy = H - 90;  // 화면 하단 영역에 표시
  // 외곽 원 (조이스틱 베이스)
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(stickStartX, cy, STICK_FULL_PX, 0, Math.PI*2);
  ctx.stroke();
  // 시작점 (조이스틱 중심)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(stickStartX, cy, 4, 0, Math.PI*2);
  ctx.fill();
  // 현재 손가락 위치 (X만 반영, Y는 동일선)
  const dx = stickCurX - stickStartX;
  const clampedDx = Math.max(-STICK_FULL_PX, Math.min(STICK_FULL_PX, dx));
  ctx.fillStyle = 'rgba(255,216,74,0.85)';
  ctx.beginPath();
  ctx.arc(stickStartX + clampedDx, cy, 14, 0, Math.PI*2);
  ctx.fill();
  // 연결선 (있을 때만)
  if(Math.abs(dx) > STICK_DEAD_PX){
    ctx.strokeStyle = 'rgba(255,216,74,0.55)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(stickStartX, cy);
    ctx.lineTo(stickStartX + clampedDx, cy);
    ctx.stroke();
  }
  ctx.restore();
}

// ============== 메뉴 ==============
function tryFullscreen(){
  const el = document.documentElement;
  if(el.requestFullscreen){ el.requestFullscreen().catch(()=>{}); }
  else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
}
function vibe(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

// ─── 묘종 미리보기 (장모 표현 풀 버전) ───
const breedPreviewCanvas = document.getElementById('breedPreview');
const breedPreviewCtx = breedPreviewCanvas.getContext('2d');

function drawBreedPreview(){
  const breed = breeds[selectedBreedIdx];
  const ctx = breedPreviewCtx;
  ctx.clearRect(0, 0, breedPreviewCanvas.width, breedPreviewCanvas.height);
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.translate(breed.coat === 'long' ? 11 : 2, breed.coat === 'long' ? 4 : 0);
  ctx.scale(2, 2);
  drawCatBreedFull(ctx, breed);
  ctx.restore();
  // 텍스트 갱신
  document.getElementById('breedName').textContent = breed.name;
  document.getElementById('breedDesc').textContent = breed.desc;
}

// 카탈로그 v3와 동일한 풀 묘종 그리기 (메뉴 전용 - 장모 마름모 머리 표현)
function drawCatBreedFull(ctx, breed){
  const isLong = breed.coat === 'long';
  const fluff = breed.fluffColor || breed.belly;
  const baseColor = (breed.pattern === 'siamese') ? breed.dark : breed.body;

  // 꼬리
  if (isLong) {
    ctx.fillStyle = baseColor;
    ctx.fillRect(-7,8,5,8); ctx.fillRect(-9,12,4,7);
    ctx.fillRect(-3,14,6,4); ctx.fillRect(-6,10,4,5);
    ctx.fillStyle = fluff;
    ctx.fillRect(-10,11,1,9); ctx.fillRect(-5,7,1,2); ctx.fillRect(-2,13,1,1);
  } else {
    ctx.fillStyle = baseColor;
    ctx.fillRect(-3,14,6,4); ctx.fillRect(-6,10,4,5);
  }

  // 몸통 외곽 보풀
  if (isLong) {
    ctx.fillStyle = fluff;
    ctx.fillRect(3,14,24,1); ctx.fillRect(3,14,1,16);
    ctx.fillRect(26,14,1,16); ctx.fillRect(3,30,24,1);
  }
  ctx.fillStyle = breed.body;
  ctx.fillRect(4,14,22,16);

  // 패턴별 몸통
  if (breed.pattern === 'tuxedo') { ctx.fillStyle = breed.belly; ctx.fillRect(8,16,14,14); }
  else if (breed.pattern === 'calico') { ctx.fillStyle = '#2c2c34'; ctx.fillRect(4,14,8,6); ctx.fillRect(18,18,8,5); }
  else if (breed.pattern === 'tabby-white') { ctx.fillStyle = breed.accentBody; ctx.fillRect(8,14,14,6); ctx.fillRect(20,20,6,4); }

  // 배
  if (breed.pattern !== 'tuxedo') { ctx.fillStyle = breed.belly; ctx.fillRect(8,22,14,7); }

  // 가슴 갈기 (장모)
  if (isLong) {
    ctx.fillStyle = fluff;
    ctx.fillRect(10,18,10,1); ctx.fillRect(11,19,8,1);
    ctx.fillRect(12,20,6,1); ctx.fillRect(13,21,4,1);
  }

  // 머리 (장모: 마름모/오각형, 단모: 사각)
  if (isLong) {
    ctx.fillStyle = fluff;
    ctx.fillRect(7,4,16,1);
    ctx.fillRect(6,5,1,5); ctx.fillRect(23,5,1,5);
    ctx.fillRect(5,9,1,1); ctx.fillRect(24,9,1,1);
    ctx.fillRect(4,10,1,2); ctx.fillRect(25,10,1,2);
    ctx.fillRect(3,12,1,3); ctx.fillRect(26,12,1,3);
    ctx.fillRect(2,13,1,2); ctx.fillRect(27,13,1,2);
    ctx.fillRect(4,15,1,2); ctx.fillRect(25,15,1,2);
    ctx.fillRect(6,17,1,1); ctx.fillRect(23,17,1,1);
    ctx.fillRect(8,18,14,1);
    ctx.fillStyle = baseColor;
    ctx.fillRect(7,4,16,5);
    ctx.fillRect(6,9,18,1);
    ctx.fillRect(5,10,20,2);
    ctx.fillRect(4,12,22,3);
    ctx.fillRect(5,15,20,2);
    ctx.fillRect(7,17,16,1);
  } else {
    ctx.fillStyle = baseColor;
    ctx.fillRect(6,4,18,14);
  }

  if (breed.pattern === 'tabby-white') { ctx.fillStyle = breed.accentBody; ctx.fillRect(6,4,8,8); }
  if (breed.pattern === 'calico') { ctx.fillStyle = '#2c2c34'; ctx.fillRect(6,4,6,7); }

  // 머프 갈기 텍스처 (장모)
  if (isLong) {
    ctx.fillStyle = breed.dark;
    ctx.fillRect(4,13,1,1); ctx.fillRect(5,12,1,1); ctx.fillRect(5,14,1,1);
    ctx.fillRect(25,13,1,1); ctx.fillRect(24,12,1,1); ctx.fillRect(24,14,1,1);
  }

  // 귀
  ctx.fillStyle = baseColor;
  ctx.beginPath(); ctx.moveTo(6,6); ctx.lineTo(8,-1); ctx.lineTo(13,5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(17,5); ctx.lineTo(22,-1); ctx.lineTo(24,6); ctx.fill();
  ctx.fillStyle = breed.earInner;
  ctx.beginPath(); ctx.moveTo(8,4); ctx.lineTo(9,1); ctx.lineTo(11,4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,4); ctx.lineTo(20,1); ctx.lineTo(22,4); ctx.fill();

  // 메인쿤 귀 술
  if (breed.earTufts) {
    ctx.fillStyle = fluff;
    ctx.fillRect(8,-2,1,2); ctx.fillRect(7,-3,2,1);
    ctx.fillRect(22,-2,1,2); ctx.fillRect(22,-3,2,1);
  }

  // 줄무늬·음영
  if (breed.pattern === 'tabby') {
    ctx.fillStyle = breed.dark;
    ctx.fillRect(8,6,1,4); ctx.fillRect(13,5,1,5); ctx.fillRect(18,6,1,4);
    ctx.fillRect(8,17,14,1); ctx.fillRect(8,21,14,1);
  } else if (breed.pattern === 'tabby-white') {
    ctx.fillStyle = breed.accentDark;
    ctx.fillRect(8,6,1,4); ctx.fillRect(20,16,1,4);
  } else if (breed.pattern === 'solid' || breed.pattern === 'siamese') {
    ctx.fillStyle = breed.dark;
    ctx.fillRect(8,17,14,1);
  }

  // 눈
  const eyeColor = breed.eyeColor || '#222';
  ctx.fillStyle = eyeColor;
  ctx.fillRect(11,9,2,3); ctx.fillRect(17,9,2,3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(11,9,1,1); ctx.fillRect(17,9,1,1);
  // 코·입
  ctx.fillStyle = breed.nose; ctx.fillRect(14,13,2,2);
  ctx.fillStyle = '#222'; ctx.fillRect(13,15,1,1); ctx.fillRect(16,15,1,1);

  // 다리
  const showWhiteFeet = (breed.pattern === 'tuxedo' || breed.pattern === 'tabby-white');
  ctx.fillStyle = showWhiteFeet ? breed.belly : breed.body;
  ctx.fillRect(5,28,5,4); ctx.fillRect(20,28,5,4);

  if (isLong) {
    ctx.fillStyle = fluff;
    ctx.fillRect(4,30,1,2); ctx.fillRect(10,30,1,2);
    ctx.fillRect(19,30,1,2); ctx.fillRect(25,30,1,2);
  }
}

// ─── 묘종 선택 핸들러 ───
function changeBreed(delta){
  selectedBreedIdx = (selectedBreedIdx + delta + breeds.length) % breeds.length;
  localStorage.setItem('catSelectedBreed', breeds[selectedBreedIdx].id);
  drawBreedPreview();
  vibe(8);
}
document.getElementById('breedPrev').addEventListener('click', () => changeBreed(-1));
document.getElementById('breedNext').addEventListener('click', () => changeBreed(1));

// localStorage 복원
(() => {
  const saved = localStorage.getItem('catSelectedBreed');
  if (saved) {
    const idx = breeds.findIndex(b => b.id === saved);
    if (idx >= 0) selectedBreedIdx = idx;
  }
  drawBreedPreview();
})();

document.getElementById('startBtn').addEventListener('click', ()=>{
  tryFullscreen();
  document.getElementById('menu').classList.add('hidden');
  initGame();
});
document.getElementById('restartBtn').addEventListener('click', ()=>{
  document.getElementById('gameover').classList.add('hidden');
  initGame();
});

// 시작
initGame();
game.state = 'menu';
loop();
</script>
