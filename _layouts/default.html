<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="shortcut icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  {% seo %}
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme">
    <svg class="sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <div class="container">
    {{ content }}
  </div>
  <script>
    (function() {
      var toggle = document.querySelector('.theme-toggle');
      var mq = window.matchMedia('(prefers-color-scheme: dark)');

      toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });

      mq.addEventListener('change', function(e) {
        var next = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.removeItem('theme');
      });
    })();
  </script>
  <script>
(function () {
  function filterByCategory(category) {
    var items = document.querySelectorAll('.archive-list li');

    // items가 있을 때만 필터링 (early return 제거)
    if (items.length) {
      items.forEach(function (li) {
        if (category === 'all' || li.dataset.category === category) {
          li.classList.remove('is-hidden');
        } else {
          li.classList.add('is-hidden');
        }
      });
    }

    var groups = document.querySelectorAll('.archive-category');
    var allGroupsHidden = true;
    if (groups.length) {
      groups.forEach(function (group) {
        var visibleItems = group.querySelectorAll('.archive-list li:not(.is-hidden)');
        if (visibleItems.length === 0) {
          group.classList.add('is-hidden');
        } else {
          group.classList.remove('is-hidden');
          allGroupsHidden = false;
        }
      });
    }

    var emptyState = document.querySelector('.archive-empty-state');
    if (emptyState) {
      emptyState.hidden = !allGroupsHidden;
    }

    // 칩 상태는 항상 업데이트 (items 여부 무관)
    var chips = document.querySelectorAll('.filter-chip');
    chips.forEach(function (chip) {
      var isActive = chip.dataset.filter === category;
      chip.classList.toggle('is-active', isActive);
      chip.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
  }

  function init() {
    var chips = document.querySelectorAll('.filter-chip');
    if (!chips.length) return;
    chips.forEach(function (chip) {
      chip.addEventListener('click', function () {
        filterByCategory(chip.dataset.filter);
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
  </script>
</body>
</html>
